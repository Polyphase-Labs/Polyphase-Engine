name: Verify Build

on:
  push:
    branches: ['version/*', 'beta/*']
  pull_request:
    branches: ['main', 'version/*']

env:
  # Test project used by verify-test-project. Swap by editing these two lines.
  TEST_PROJECT_REPO: https://github.com/mholtkamp/octo-bombers
  TEST_PROJECT_SUBDIR: Bomber   # subdirectory inside the clone that contains the .octp

  # All-in-one build environment maintained at Docker/Dockerfile.base and
  # published to Docker Hub. It bundles debian:bookworm-slim (glibc 2.36,
  # gcc 12) + g++/make, Vulkan SDK + glslc, devkitPro pacman, devkitPPC +
  # devkitARM toolchains, libogc2 + libogc2-libdvm + 3ds-dev + wii-dev +
  # gamecube-tools-git, and curl-impersonate for Cloudflare bypass on
  # rebuilds. Bookworm is the minimum base because devkitPro's toolchain
  # binaries (powerpc-eabi-g++, arm-none-eabi-g++) themselves require
  # glibc 2.36+; an older base would install them but they'd crash at
  # runtime with "GLIBC_2.36 not found".
  # Using one image for both build-linux and verify-test-project guarantees
  # ABI compatibility and removes the per-step apt installs entirely
  # (~25 min off cold runs).
  POLYPHASE_BASE_IMAGE: polyphaselabs/polyphase-bare:latest

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: polyphaselabs/polyphase-bare:latest
    # GH Actions defaults `run:` to `sh -e` (dash) inside `container:` jobs.
    # We use bash idioms (arrays, [[ ]], pipefail) in several places, and the
    # polyphase-bare image always has bash, so flip the default once.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace safe for git submodules (running as root in container)
        run: git config --global --add safe.directory '*'

      - name: Initialize submodules
        run: |
          git submodule init -- External/bullet3 External/doxygen-awesome-css External/zep Engine/External/PolyVox Engine/External/libgit2 Plugins/Blender/polyshade-gameengine-connect
          git submodule update --recursive

      # Backstop in case the polyphase-bare image hasn't been rebuilt yet
      # with the latest Dockerfile.base additions. Idempotent: if every tool
      # is already there, this is a ~5ms no-op. Once the image catches up
      # this whole step short-circuits without an apt-get update at all.
      #   python3     - Tools/generate_embedded_stubs.py
      #   cmake       - Tools/prebuild_libgit2.sh
      #   libssl-dev  - libgit2 HTTPS backend (SelectHTTPSBackend.cmake)
      - name: Ensure python3 + cmake + libssl-dev are available
        run: |
          missing=()
          command -v python3 >/dev/null 2>&1 || missing+=(python3)
          command -v cmake >/dev/null 2>&1 || missing+=(cmake)
          [ -f /usr/include/openssl/ssl.h ] || missing+=(libssl-dev)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Installing missing tools: ${missing[*]}"
            apt-get update
            apt-get install -y --no-install-recommends "${missing[@]}"
          fi

      - name: Compile shaders
        working-directory: Engine/Shaders/GLSL
        run: chmod +x compile.sh && ./compile.sh

      - name: Prebuild libgit2
        run: bash Tools/prebuild_libgit2.sh

      - name: Generate Standalone embedded asset stubs
        run: python3 Tools/generate_embedded_stubs.py

      - name: Build Engine (Linux Editor)
        run: make -C Standalone -f Makefile_Linux_Editor -j$(nproc)

      # The Linux engine build statically compiles Lua sources directly into
      # libEngineEditor.a, so it does NOT produce a standalone libLua.a the
      # way Windows does via Lua.vcxproj. release.yml needs libLua.a present
      # for the staged distribution; build it here too so the verify workflow
      # catches any breakage in the Lua Makefile before it reaches a release.
      - name: Build libLua.a for native addons
        # Upstream External/Lua/Makefile compiles its .o files IN-TREE
        # (External/Lua/lapi.o, lauxlib.o, ...). Those are x86-64 here, and
        # if they leak into the artifact uploaded for verify-test-project, the
        # Wii/GameCube/3DS engine Makefiles' VPATH (which includes
        # ../External/Lua) finds them, considers them up-to-date vs the .c
        # sources, and archives x86-64 .o into libEngine.a -> powerpc-eabi-ld
        # rejects with "Relocations in generic ELF (EM: 62)". `make clean`
        # wipes the in-tree .o (we already copied liblua.a out before clean).
        run: |
          make -C External/Lua a -j$(nproc)
          mkdir -p External/Lua/Build/Linux/x64/ReleaseEditor
          cp External/Lua/liblua.a External/Lua/Build/Linux/x64/ReleaseEditor/libLua.a
          test -f External/Lua/Build/Linux/x64/ReleaseEditor/libLua.a
          make -C External/Lua clean
          test -f External/Lua/Build/Linux/x64/ReleaseEditor/libLua.a  # survives the clean

      - name: Upload editor + runtime tree for verify-test-project
        uses: actions/upload-artifact@v4
        with:
          name: polyphase-editor-tree
          # Exclude Intermediate/ everywhere: gcc's -MMD-generated .d files
          # bake the build-host's absolute paths into dependency lists. Even
          # though we now run both jobs in the same image, the workspace path
          # ($PWD) can still differ between runner instances, so dropping
          # intermediates keeps the artifact lean and the verify build hermetic.
          path: |
            Standalone/Build/Linux/PolyphaseEditor.elf
            Engine
            External
            Standalone
            Template
            Tools
            Plugins
            !**/Intermediate
            !**/Intermediate/**
          retention-days: 1
          if-no-files-found: error

  verify-test-project:
    needs: build-linux
    runs-on: ubuntu-latest
    # Same image as build-linux: identical glibc, identical libstdc++,
    # devkitPro/libogc2/devkitARM all preinstalled. No per-platform install
    # steps needed — every matrix entry runs in the same baked environment.
    container:
      image: polyphaselabs/polyphase-bare:latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        platform: [Linux, Wii, GameCube, 3DS]
    steps:
      - name: Download editor + runtime tree
        uses: actions/download-artifact@v4
        with:
          name: polyphase-editor-tree

      - name: Restore script + binary execute bits
        # actions/upload-artifact strips POSIX exec bits — re-chmod everything
        # the headless editor will exec at runtime (build threads exec
        # Engine/Shaders/GLSL/compile.sh and various Tools/* scripts).
        run: |
          chmod +x Standalone/Build/Linux/PolyphaseEditor.elf
          find Tools Engine Standalone -type f -name '*.sh' -print0 \
            | xargs -0 -r chmod +x

      - name: Verify editor can load (ABI sanity check)
        # Editor was built in the same image, so this should always pass.
        # Kept as a defensive guard for future image changes.
        run: |
          echo "Container glibc:"
          ldd --version | head -1 || true
          echo "Editor link check:"
          ldd Standalone/Build/Linux/PolyphaseEditor.elf || true
          if ! Standalone/Build/Linux/PolyphaseEditor.elf -h >/dev/null 2>err.txt; then
            if grep -q 'GLIBC' err.txt; then
              echo "FATAL: editor binary needs newer glibc than container provides." >&2
              cat err.txt >&2
              exit 1
            fi
          fi
          rm -f err.txt

      - name: Clone test project
        run: bash Tools/CI/TestBuildProject/clone_test_project.sh "${{ env.TEST_PROJECT_REPO }}" ./test-project

      - name: Verify build for ${{ matrix.platform }}
        run: |
          bash Tools/CI/TestBuildProject/verify_project_build.sh \
            Standalone/Build/Linux/PolyphaseEditor.elf \
            "./test-project/${{ env.TEST_PROJECT_SUBDIR }}" \
            ${{ matrix.platform }}

      - name: Cleanup local clone
        if: always()
        run: bash Tools/CI/TestBuildProject/cleanup_test_project.sh ./test-project || true
