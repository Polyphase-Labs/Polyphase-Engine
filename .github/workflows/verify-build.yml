name: Verify Build

on:
  push:
    branches: ['version/*', 'beta/*']
  pull_request:
    branches: ['main', 'version/*']

env:
  # Test project used by verify-test-project. Swap by editing these two lines.
  TEST_PROJECT_REPO: https://github.com/mholtkamp/octo-bombers
  TEST_PROJECT_SUBDIR: Bomber   # subdirectory inside the clone that contains the .octp

jobs:
  build-linux:
    # Pinned to 22.04 (glibc 2.35, gcc 11 / GLIBCXX_3.4.30) so the editor
    # binary runs on the verify-test-project containers — devkitPro images
    # are Debian Bookworm (glibc 2.36, gcc 12) and ubuntu-latest's 24.04
    # binary needs glibc 2.38+ and GLIBCXX_3.4.32+ (gcc 13), which Bookworm
    # doesn't have. 22.04 is the oldest supported `ubuntu-*` runner image
    # and is forward-compatible with both Bookworm and 24.04 verify containers.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: |
          git submodule init -- External/bullet3 External/doxygen-awesome-css External/zep Engine/External/PolyVox Engine/External/libgit2 Plugins/Blender/polyshade-gameengine-connect
          git submodule update --recursive

      - name: Install Vulkan SDK
        run: |
          VER=1.3.275.0
          wget -q https://sdk.lunarg.com/sdk/download/$VER/linux/vulkansdk-linux-x86_64-$VER.tar.xz
          sudo mkdir -p /opt/vulkan
          sudo tar -xf vulkansdk-linux-x86_64-$VER.tar.xz -C /opt/vulkan
          rm vulkansdk-linux-x86_64-$VER.tar.xz
          echo "VULKAN_SDK=/opt/vulkan/$VER/x86_64" >> $GITHUB_ENV
          echo "/opt/vulkan/$VER/x86_64/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=/opt/vulkan/$VER/x86_64/lib" >> $GITHUB_ENV

      - name: Compile shaders
        working-directory: Engine/Shaders/GLSL
        run: chmod +x compile.sh && ./compile.sh

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libasound2-dev libx11-dev \
            libpulse-dev \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            pkg-config cmake
          # libpulse-dev: streaming audio backend (engine)
          # libav*-dev / libsw*-dev: FFmpeg backend used by the VideoPlayer addon
          # pkg-config: addon build scripts resolve FFmpeg via pkg-config on Linux

      - name: Prebuild libgit2
        run: bash Tools/prebuild_libgit2.sh

      - name: Generate Standalone embedded asset stubs
        run: python3 Tools/generate_embedded_stubs.py

      - name: Build Engine (Linux Editor)
        run: make -C Standalone -f Makefile_Linux_Editor -j$(nproc)

      # The Linux engine build statically compiles Lua sources directly into
      # libEngineEditor.a, so it does NOT produce a standalone libLua.a the
      # way Windows does via Lua.vcxproj. release.yml needs libLua.a present
      # for the staged distribution; build it here too so the verify workflow
      # catches any breakage in the Lua Makefile before it reaches a release.
      - name: Build libLua.a for native addons
        # The upstream External/Lua/Makefile compiles its .o files IN-TREE
        # (External/Lua/lapi.o, lauxlib.o, ...). Those are x86-64 here, and
        # if they leak into the artifact uploaded for verify-test-project, the
        # Wii/GameCube/3DS engine Makefiles' VPATH (which includes
        # ../External/Lua) finds them, considers them up-to-date vs the .c
        # sources, and archives x86-64 .o into libEngine.a -> powerpc-eabi-ld
        # rejects with "Relocations in generic ELF (EM: 62)". `make clean`
        # wipes the in-tree .o (and the in-tree liblua.a — we already copied
        # it to Build/Linux/x64/ReleaseEditor/ before cleaning).
        run: |
          make -C External/Lua a -j$(nproc)
          mkdir -p External/Lua/Build/Linux/x64/ReleaseEditor
          cp External/Lua/liblua.a External/Lua/Build/Linux/x64/ReleaseEditor/libLua.a
          test -f External/Lua/Build/Linux/x64/ReleaseEditor/libLua.a
          make -C External/Lua clean
          test -f External/Lua/Build/Linux/x64/ReleaseEditor/libLua.a  # survives the clean

      # Upload the editor binary plus the source/headers/Makefiles the headless
      # editor needs at runtime (it shells out to make for per-platform game
      # builds). The verify-test-project matrix downloads this so it doesn't have to
      # rebuild the engine 4x.
      - name: Upload editor + runtime tree for verify-test-project
        uses: actions/upload-artifact@v4
        with:
          name: polyphase-editor-tree
          # Exclude Intermediate/ everywhere: gcc's -MMD-generated .d files
          # bake the build-host's absolute paths (/home/runner/work/...) into
          # the dependency lists. When the verify-test-project container reads
          # those .d files at /__w/... and tries to rebuild, make demands the
          # original /home/runner/... paths and fails with
          #   "make[3]: *** No rule to make target '/home/runner/.../X.cpp'"
          path: |
            Standalone/Build/Linux/PolyphaseEditor.elf
            Engine
            External
            Standalone
            Template
            Tools
            Plugins
            !**/Intermediate
            !**/Intermediate/**
          retention-days: 1
          if-no-files-found: error

  verify-test-project:
    needs: build-linux
    runs-on: ubuntu-latest
    # Run each matrix entry inside the appropriate prebuilt devkitPro image
    # for consoles, or a vanilla ubuntu:24.04 for Linux. We previously tried
    # `apt-get install devkitpro-pacman` on the runner host but pkg.devkitpro.org
    # sits behind Cloudflare and intermittently 403's the package fetch, even
    # with retries. The Docker images bake the toolchain in and bypass that
    # whole problem. Editor was built on ubuntu:24.04, so devkitPro images
    # need a glibc >= 2.39 to load it (devkitpro images are currently 24.04-
    # based, so this works). If glibc compat ever breaks, build the editor
    # inside the same container instead.
    container:
      image: ${{ matrix.container }}
    strategy:
      # Independent toolchains; surface every platform's failure on a single run.
      fail-fast: false
      matrix:
        include:
          - { platform: Linux,    container: 'ubuntu:24.04' }
          - { platform: Wii,      container: 'devkitpro/devkitppc:latest' }
          - { platform: GameCube, container: 'devkitpro/devkitppc:latest' }
          - { platform: 3DS,      container: 'devkitpro/devkitarm:latest' }
    steps:
      # Containers are minimal — install everything the editor + scripts need
      # at runtime. No sudo because we're root inside the container.
      #
      # ALSA package name varies by base distro:
      #   - Ubuntu 24.04+   -> libasound2t64 (time_t 64-bit transition)
      #   - Debian Bookworm -> libasound2     (devkitPro images use this)
      # Detect which is available and install the matching one.
      - name: Install runtime deps and shell tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libvulkan1 libxcb1 libpulse0 libssl3 \
            git ca-certificates findutils xz-utils binutils
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            apt-get install -y --no-install-recommends libasound2t64
          else
            apt-get install -y --no-install-recommends libasound2
          fi

      - name: Download editor + runtime tree
        uses: actions/download-artifact@v4
        with:
          name: polyphase-editor-tree

      - name: Restore script + binary execute bits
        # actions/upload-artifact strips POSIX exec bits — re-chmod everything
        # the headless editor will exec at runtime (build threads exec
        # Engine/Shaders/GLSL/compile.sh and various Tools/* scripts).
        run: |
          chmod +x Standalone/Build/Linux/PolyphaseEditor.elf
          find Tools Engine Standalone -type f -name '*.sh' -print0 \
            | xargs -0 -r chmod +x

      - name: Verify editor can load (glibc / dyn-link sanity check)
        # Editor is built on ubuntu-22.04 (glibc 2.35, GLIBCXX_3.4.30) so it
        # loads on both Debian Bookworm (devkitPro images, glibc 2.36) and
        # ubuntu:24.04 (Linux verify, glibc 2.39). This step is now a sanity
        # guard: if the build runner ever drifts back to a newer libc the
        # FATAL message will surface immediately instead of confusing later
        # crashes deeper in the headless build flow.
        run: |
          echo "Container glibc:"
          ldd --version | head -1 || true
          echo "Editor glibc requirements:"
          objdump -T Standalone/Build/Linux/PolyphaseEditor.elf 2>/dev/null \
            | awk '/GLIBC_/ { print $5 }' | sort -u || true
          echo "Editor link check:"
          if ! ldd Standalone/Build/Linux/PolyphaseEditor.elf; then
            echo "WARNING: ldd reported issues — editor may not load." >&2
          fi
          echo "Editor self-test invocation:"
          if ! Standalone/Build/Linux/PolyphaseEditor.elf -h >/dev/null 2>ldd-err.txt; then
            # The editor doesn't have a -h flag, but failure to launch will
            # produce a glibc-style error; success/exit-1 means it loaded.
            if grep -q 'GLIBC' ldd-err.txt; then
              echo "FATAL: editor binary needs newer glibc than container provides." >&2
              cat ldd-err.txt >&2
              exit 1
            fi
          fi
          rm -f ldd-err.txt

      - name: Install Linux compile toolchain (Linux verify only)
        if: matrix.platform == 'Linux'
        # ubuntu:24.04 is minimal — no `make`, no g++, no glslc by default.
        # The headless editor invokes:
        #   - Engine/Shaders/GLSL/compile.sh   (calls glslc -- noble main has it)
        #   - make -C Standalone -f Makefile_TEMP -j 12   (needs make + g++)
        # Without these the build flow exits with "make: not found" / "glslc
        # not detected". devkitPro images (Wii/GC/3DS) already have make+gcc
        # for cross-compilation host tools, so this only applies to Linux.
        run: |
          apt-get install -y --no-install-recommends \
            build-essential glslc

      - name: Install libogc2 (Wii / GameCube only)
        if: matrix.platform == 'Wii' || matrix.platform == 'GameCube'
        # devkitpro/devkitppc:latest ships libogc (the original) but engine
        # Makefile_GCN / Makefile_Wii include $(DEVKITPRO)/libogc2/*_rules —
        # the modern Extrems fork.
        #
        # Strategy: avoid syncing pkg.devkitpro.org repos entirely (they sit
        # behind Cloudflare and 403 the package-database fetch). Use a
        # temporary pacman.conf that ONLY declares the libogc2-devkitpro repo
        # (hosted at packages.libogc2.org / packages.extremscorner.org — no
        # Cloudflare). Pacman --dbpath points at the existing devkitpro DB so
        # transitive dependencies (devkitPPC, etc.) resolve as already-
        # installed via the local DB, no upstream sync required.
        run: |
          set -e
          LIBOGC2_KEY="C8A2759C315CFBC3429CC2E422B803BA8AA3D7CE"
          if ! dkp-pacman-key --list-keys "$LIBOGC2_KEY" >/dev/null 2>&1; then
            dkp-pacman-key --recv-keys "$LIBOGC2_KEY" --keyserver keyserver.ubuntu.com
            dkp-pacman-key --lsign-key "$LIBOGC2_KEY"
          fi
          TMP_CONF=/tmp/pacman-libogc2.conf
          {
            echo '[options]'
            echo 'Architecture = auto'
            echo 'SigLevel = Required DatabaseOptional'
            echo 'LocalFileSigLevel = Optional'
            echo 'GPGDir = /opt/devkitpro/pacman/etc/pacman.d/gnupg/'
            echo ''
            echo '[libogc2-devkitpro]'
            echo 'Server = https://packages.libogc2.org/devkitpro/linux/$arch'
            echo 'Server = https://packages.extremscorner.org/devkitpro/linux/$arch'
          } > "$TMP_CONF"
          install_ok=0
          for attempt in 1 2 3; do
            if [ $attempt -gt 1 ]; then
              echo "Retrying libogc2 install (attempt $attempt of 3)..." >&2
              sleep $((attempt * 3))
            fi
            if dkp-pacman --config "$TMP_CONF" \
                          --dbpath /opt/devkitpro/pacman/var/lib/pacman \
                          -Syy --noconfirm \
               && dkp-pacman --config "$TMP_CONF" \
                             --dbpath /opt/devkitpro/pacman/var/lib/pacman \
                             -S --noconfirm libogc2 libogc2-libdvm; then
              install_ok=1
              break
            fi
          done
          if [ $install_ok -ne 1 ]; then
            echo "ERROR: libogc2 install failed (libogc2 mirror down?)" >&2
            exit 1
          fi
          # Sanity: confirm the rules file the engine Makefile expects exists.
          test -f /opt/devkitpro/libogc2/gamecube_rules
          test -f /opt/devkitpro/libogc2/wii_rules

      - name: Surface devkitPro env vars for the headless editor's make
        if: matrix.platform != 'Linux'
        # devkitpro/* images export DEVKITPRO via /etc/environment, but Actions
        # steps don't source that. Set them explicitly so when the headless
        # editor shells out to make, the per-platform Makefile finds the
        # toolchain (powerpc-eabi-gcc / arm-none-eabi-gcc).
        run: |
          {
            echo "DEVKITPRO=/opt/devkitpro"
            echo "DEVKITPPC=/opt/devkitpro/devkitPPC"
            echo "DEVKITARM=/opt/devkitpro/devkitARM"
          } >> "$GITHUB_ENV"
          {
            echo "/opt/devkitpro/tools/bin"
            echo "/opt/devkitpro/devkitPPC/bin"
            echo "/opt/devkitpro/devkitARM/bin"
          } >> "$GITHUB_PATH"

      - name: Clone test project
        run: bash Tools/CI/TestBuildProject/clone_test_project.sh "${{ env.TEST_PROJECT_REPO }}" ./test-project

      - name: Verify build for ${{ matrix.platform }}
        run: |
          bash Tools/CI/TestBuildProject/verify_project_build.sh \
            Standalone/Build/Linux/PolyphaseEditor.elf \
            "./test-project/${{ env.TEST_PROJECT_SUBDIR }}" \
            ${{ matrix.platform }}

      # Hosted runners are ephemeral so cleanup is a formality, but it keeps
      # the script exercised and is required if this ever runs on a self-hosted
      # runner.
      - name: Cleanup local clone
        if: always()
        run: bash Tools/CI/TestBuildProject/cleanup_test_project.sh ./test-project || true
