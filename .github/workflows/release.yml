name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  # Test project used by verify-test-project. Swap by editing these two lines.
  TEST_PROJECT_REPO: https://github.com/mholtkamp/octo-bombers
  TEST_PROJECT_SUBDIR: Bomber   # subdirectory inside the clone that contains the .octp

  # Docker Hub image name for the engine container. Override per-repo via a
  # DOCKERHUB_ENGINE_IMAGE repository variable (Settings → Secrets and
  # variables → Actions → Variables) if the fork publishes under a different
  # org. Bakes the prebuilt Linux Editor + build-{editor,linux,3ds,gcn,wii}
  # helper scripts on top of the bare toolchain. End-users bind-mount their
  # project and call build-* without touching the toolchain themselves.
  # Built from Docker/Dockerfile.
  #
  # The companion polyphaselabs/polyphase-bare image (Docker/Dockerfile.base)
  # is referenced as a `container:` by build-linux / verify-test-project, but
  # is published manually from a workstation — not built by this workflow.
  # See the publish-docker-images job docstring for why.
  DEFAULT_ENGINE_IMAGE: polyphaselabs/polyphase-engine

jobs:
  # =========================================================================
  #  Windows: Build engine + create Inno Setup installer
  # =========================================================================
  build-windows:
    # Gated on publish-docker-images so a Docker build failure (the slowest
    # and historically flakiest step) skips the Windows installer build
    # instead of letting it burn 20+ minutes before we discover the release
    # can't ship anyway. See the publish-docker-images job docstring.
    needs: publish-docker-images
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: |
          git submodule init -- External/bullet3 External/doxygen-awesome-css External/zep Engine/External/PolyVox Engine/External/libgit2 Plugins/Blender/polyshade-gameengine-connect
          git submodule update --recursive

      # Vulkan SDK is pinned to 1.3.275.0 to match what the engine has been
      # tested against (shader compilation, spirv-cross / shaderc lib ABI,
      # validation-layer config). Bumping has been deferred because newer
      # SDKs trip shader-compile warnings the engine treats as errors.
      #
      # LunarG removed 1.3.275.0 from their direct CDN around 2026-05, and
      # the SDK self-cleans its installer after running so a fresh dev box
      # can't even re-archive it from a local install. The workaround: a
      # one-time PowerShell `Compress-Archive` of the installed
      # C:\VulkanSDK\1.3.275.0\ tree, published as a GitHub Release asset
      # on this very repo, then re-extracted on every CI run. No installer
      # invocation, no license prompts, no startup-component selection —
      # the zip already reflects the components-selected install from a
      # working dev box.
      #
      # Mirror upload procedure (do once when the version changes):
      #   1. On a workstation with the SDK installed:
      #        Compress-Archive -Path 'C:\VulkanSDK\1.3.275.0\*' `
      #                         -DestinationPath VulkanSDK-1.3.275.0-installed.zip `
      #                         -CompressionLevel Optimal
      #   2. GitHub → Releases → Draft new release, tag `vulkan-sdk-1.3.275.0`
      #      (NOT v-prefixed — that would trigger this very workflow).
      #   3. Drag the zip in as an asset, publish.
      - name: Install Vulkan SDK
        shell: pwsh
        env:
          VULKAN_ZIP_URL: https://github.com/Polyphase-Labs/Polyphase-Engine/releases/download/vulkan-sdk-1.3.275.0/VulkanSDK-1.3.275.0-installed.zip
        run: |
          $VER = "1.3.275.0"
          $dst = "C:\VulkanSDK\$VER"
          $zip = "$env:TEMP\VulkanSDK.zip"
          Write-Host "Downloading Vulkan SDK $VER from $env:VULKAN_ZIP_URL"
          Invoke-WebRequest -Uri $env:VULKAN_ZIP_URL -OutFile $zip -UserAgent "Mozilla/5.0"
          Write-Host "Extracting to $dst"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Expand-Archive -Path $zip -DestinationPath $dst -Force
          # Sanity: the extracted tree must contain Include\vulkan and Lib\vulkan-1.lib
          if (-not (Test-Path "$dst\Include\vulkan")) { throw "Vulkan SDK extract failed: $dst\Include\vulkan missing" }
          if (-not (Test-Path "$dst\Lib\vulkan-1.lib")) { throw "Vulkan SDK extract failed: $dst\Lib\vulkan-1.lib missing" }
          "VULKAN_SDK=$dst" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Compile shaders
        shell: cmd
        working-directory: Engine/Shaders/GLSL
        run: compile.bat

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Prebuild libgit2
        shell: cmd
        run: |
          cd Engine\External\libgit2
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DBUILD_SHARED_LIBS=OFF -DBUILD_TESTS=OFF -DBUILD_CLI=OFF -DBUILD_EXAMPLES=OFF -DUSE_SSH=OFF -DUSE_BUNDLED_ZLIB=ON -DREGEX_BACKEND=builtin
          cmake --build build --config Release
          cmake --build build --config Debug
          if not exist "..\..\External\lib\Lib" mkdir "..\..\External\lib\Lib"
          copy /Y "build\Release\git2.lib" "..\..\External\lib\Lib\git2.lib"
          copy /Y "build\Debug\git2.lib" "..\..\External\lib\Lib\git2d.lib"

      - name: Generate Standalone embedded asset stubs
        run: python Tools/generate_embedded_stubs.py

      - name: Build Engine (ReleaseEditor x64)
        run: msbuild Polyphase.sln /p:Configuration=ReleaseEditor /p:Platform=x64 /m

      # W1: Also build the DLL-flavor editor + game runtimes. These ship
      # alongside the static editor exe in the installer (and SDK zip) so
      # native addons can link against the DLL editor import lib, and shipped
      # games can use the DLL game runtime. Build is best-effort: a failure
      # here doesn't gate the release on the assumption that the static
      # editor is the primary deliverable today.
      - name: Build Engine (ReleaseEditor Shared x64)
        continue-on-error: true
        run: msbuild Polyphase.sln /p:Configuration="ReleaseEditor Shared" /p:Platform=x64 /m

      - name: Build Engine (Release Shared x64)
        continue-on-error: true
        run: msbuild Polyphase.sln /p:Configuration="Release Shared" /p:Platform=x64 /m

      # stage_distribution.py only WARNS when these are missing, which produces a
      # broken installer where native addons can't link (LNK1181: Polyphase.lib
      # not found). Fail the workflow here so the issue is caught loudly.
      - name: Verify import libraries for native addon builds
        shell: cmd
        run: |
          if not exist "Standalone\Build\Windows\x64\ReleaseEditor\Polyphase.lib" (
            echo ERROR: Polyphase.lib was not produced by the engine build.
            echo        Expected: Standalone\Build\Windows\x64\ReleaseEditor\Polyphase.lib
            echo        Without it, native addons cannot link against the installed editor.
            exit /b 1
          )
          if not exist "External\Lua\Build\Windows\x64\ReleaseEditor\Lua.lib" (
            echo ERROR: Lua.lib was not produced by the engine build.
            echo        Expected: External\Lua\Build\Windows\x64\ReleaseEditor\Lua.lib
            exit /b 1
          )
          echo [OK] Polyphase.lib and Lua.lib found.

      - name: Stage distribution files
        run: python Installers/stage_distribution.py --platform windows --verbose

      - name: Verify staged import libraries
        shell: cmd
        run: |
          if not exist "dist\Editor\Polyphase.lib" (
            echo ERROR: Polyphase.lib is missing from the staged distribution.
            echo        Expected: dist\Editor\Polyphase.lib
            echo        The installer would ship without native-addon link support.
            exit /b 1
          )
          if not exist "dist\Editor\Lua.lib" (
            echo ERROR: Lua.lib is missing from the staged distribution.
            echo        Expected: dist\Editor\Lua.lib
            exit /b 1
          )
          echo [OK] Import libraries staged into dist\Editor\.

      # Package the headers + Release-CRT import libs as a standalone SDK zip
      # so native-addon CI (e.g. com.polyphase.system.character.dialogue.core)
      # can curl it from the Release page instead of git-cloning the engine
      # source and still hitting LNK2019 for lack of import libs. The script
      # aborts non-zero with a clear message if either .lib is missing, so a
      # separate verify step here would be redundant.
      - name: Package Windows native-addon SDK
        run: python Installers/package_windows_sdk.py --verbose

      - name: Upload Windows SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-sdk
          path: polyphase-sdk-windows-x64.zip
          if-no-files-found: error

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc Installers\Windows\PolyphaseSetup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/PolyphaseSetup-*.exe

  # =========================================================================
  #  Linux: Build engine + create .deb and tarball
  # =========================================================================
  build-linux:
    # Same fail-fast rationale as build-windows above — if the Docker build
    # crashes, skip this too instead of doing redundant work that won't ship.
    needs: publish-docker-images
    runs-on: ubuntu-latest
    # All-in-one build env (Docker/Dockerfile.base): debian:bookworm-slim
    # (glibc 2.36, gcc 12) + Vulkan SDK + glslc + devkitPro + libogc2 +
    # curl-impersonate. Replaces the per-step apt installs that ballooned
    # to 20+ min on slow mirrors. Bookworm is the minimum base because
    # devkitPro's pre-built toolchain binaries themselves need glibc 2.36+.
    # Editor binaries built here run on Bookworm, Ubuntu 24.04+, RHEL 9.4+,
    # and Fedora 36+.
    container:
      image: polyphaselabs/polyphase-bare:latest
    # Container jobs default to dash; flip to bash so array/[[ ]]/pipefail work.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace safe for git submodules
        run: git config --global --add safe.directory '*'

      - name: Initialize submodules
        run: |
          git submodule init -- External/bullet3 External/doxygen-awesome-css External/zep Engine/External/PolyVox Engine/External/libgit2 Plugins/Blender/polyshade-gameengine-connect
          git submodule update --recursive

      # Backstop in case the polyphase-bare image hasn't been rebuilt yet
      # with the latest Dockerfile.base additions. Idempotent: a no-op once
      # the image catches up.
      #   python3     - asset stub generator
      #   dpkg-dev    - .deb packaging (dpkg-deb binary)
      #   cmake       - libgit2 prebuild
      #   libssl-dev  - libgit2 HTTPS backend (SelectHTTPSBackend.cmake);
      #                 without it cmake bails with "Unable to autodetect a
      #                 usable HTTPS backend".
      - name: Ensure python3 + dpkg-dev + cmake + libssl-dev are available
        run: |
          missing=()
          command -v python3 >/dev/null 2>&1 || missing+=(python3)
          command -v dpkg-deb >/dev/null 2>&1 || missing+=(dpkg-dev)
          command -v cmake >/dev/null 2>&1 || missing+=(cmake)
          [ -f /usr/include/openssl/ssl.h ] || missing+=(libssl-dev)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Installing missing tools: ${missing[*]}"
            apt-get update
            apt-get install -y --no-install-recommends "${missing[@]}"
          fi

      - name: Compile shaders
        working-directory: Engine/Shaders/GLSL
        run: chmod +x compile.sh && ./compile.sh

      - name: Prebuild libgit2
        run: bash Tools/prebuild_libgit2.sh

      # External/mbedtls/include is gitignored (would add MBs to the repo —
      # see External/mbedtls/.gitignore). The committed lib-{wii,gcn}/ archives
      # are enough to LINK, but the engine compile of HttpBackend_Dolphin.cpp
      # on Wii/GameCube needs the public headers (Engine/Makefile_Wii and
      # Makefile_GCN both put ../External/mbedtls/include in INCLUDES). Pull
      # the tag pinned in External/mbedtls/README.md once here so the headers
      # ride along in the polyphase-editor-tree artifact and every Wii/GCN
      # verify-test-project run finds <mbedtls/ssl.h>.
      - name: Vendor mbedTLS headers for Wii/GameCube HTTPS backend
        run: |
          cd External/mbedtls
          if [ ! -f include/mbedtls/ssl.h ]; then
            git clone --depth 1 --branch v3.6.2 https://github.com/Mbed-TLS/mbedtls.git _clone
            mv _clone/include ./include
            cp _clone/LICENSE ./LICENSE 2>/dev/null || true
            rm -rf _clone
            cp polyphase_mbedtls_user_config.h.template include/mbedtls/polyphase_mbedtls_user_config.h
          fi
          test -f include/mbedtls/ssl.h

      - name: Generate Standalone embedded asset stubs
        run: python3 Tools/generate_embedded_stubs.py

      # W1: DLL-flavor editor + game shared objects come FIRST so the
      # subsequent static editor build can overwrite the elf at
      # Standalone/Build/Linux/PolyphaseEditor.elf without losing the
      # .so files. Both make invocations write the elf to the same path
      # (TARGET name is shared) but only the shared build emits the .so —
      # it lives at Standalone/Build/Linux/libPolyphaseEditor.so afterwards,
      # picked up by stage_distribution.py and shipped in dist/Editor/.
      # Static elf is the one verify-test-project downloads via the
      # polyphase-editor-tree artifact (it has no .so dependency), so
      # building static last keeps that artifact runnable end-to-end.
      # Best-effort: continue-on-error so a fork that hasn't validated
      # the .so path yet still gets a working static-only release.
      - name: Build Engine (Linux Editor Shared)
        continue-on-error: true
        run: make -C Standalone -f Makefile_Linux_Editor POLYPHASE_SHARED=1 -j$(nproc)

      - name: Build Engine (Linux Game Shared)
        continue-on-error: true
        run: make -C Standalone -f Makefile_Linux_Game POLYPHASE_SHARED=1 -j$(nproc)

      - name: Build Engine (Linux Editor)
        run: make -C Standalone -f Makefile_Linux_Editor -j$(nproc)

      # The Linux engine build statically compiles Lua sources directly into
      # libEngineEditor.a, so it does NOT produce a standalone libLua.a the way
      # the Windows Lua.vcxproj produces Lua.lib. Build libLua.a separately so
      # stage_distribution.py can ship it for native-addon link support. Use
      # the `a` target (archive only) to avoid pulling in -lreadline for the
      # lua/luac binaries we don't need.
      - name: Build libLua.a for native addons
        # The in-tree .o files left behind by External/Lua/Makefile would
        # pollute the artifact and break Wii/GC/3DS verify (PPC ld rejects
        # x86-64 lapi.o). `make clean` removes them; the staged libLua.a
        # at Build/Linux/x64/ReleaseEditor/ survives because clean only
        # touches in-tree paths.
        run: |
          make -C External/Lua a -j$(nproc)
          mkdir -p External/Lua/Build/Linux/x64/ReleaseEditor
          cp External/Lua/liblua.a External/Lua/Build/Linux/x64/ReleaseEditor/libLua.a
          make -C External/Lua clean

      # stage_distribution.py only WARNS when libLua.a is missing, which
      # produces a broken package where native addons must fall back to a
      # system Lua. Fail the workflow here so the issue is caught loudly.
      - name: Verify import library for native addon builds
        run: |
          LUA_LIB_RELEASE="External/Lua/Build/Linux/x64/ReleaseEditor/libLua.a"
          LUA_LIB_DEBUG="External/Lua/Build/Linux/x64/DebugEditor/libLua.a"
          if [ ! -f "$LUA_LIB_RELEASE" ] && [ ! -f "$LUA_LIB_DEBUG" ]; then
            echo "ERROR: libLua.a was not produced by the engine build."
            echo "       Expected at one of:"
            echo "         $LUA_LIB_RELEASE"
            echo "         $LUA_LIB_DEBUG"
            exit 1
          fi
          echo "[OK] libLua.a found."

      # Upload the editor binary plus the source/headers/Makefiles the headless
      # editor needs at runtime (it shells out to make for per-platform game
      # builds). The verify-test-project matrix downloads this so it doesn't have to
      # rebuild the engine 4x.
      - name: Upload editor + runtime tree for verify-test-project
        uses: actions/upload-artifact@v4
        with:
          name: polyphase-editor-tree
          # Exclude Intermediate/ everywhere — gcc's -MMD .d files have
          # absolute paths from the build-host runner, which break make in
          # the verify container (different workspace path).
          path: |
            Standalone/Build/Linux/PolyphaseEditor.elf
            Engine
            External
            Standalone
            Template
            Tools
            Plugins
            !**/Intermediate
            !**/Intermediate/**
          retention-days: 1
          if-no-files-found: error

      - name: Build .deb package
        run: bash Installers/build_deb_linux.sh

      - name: Build tarball
        run: bash Installers/build_tarball_linux.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/polyphase-engine_*_amd64.deb

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: dist/PolyphaseEditor-linux-x64.tar.gz

  # =========================================================================
  #  Verify the engine can package a real project end-to-end (Linux/Wii/
  #  GameCube/3DS) by headless-building $TEST_PROJECT_REPO. Gates the
  #  release so a regression in the headless build path or a per-platform
  #  Makefile blocks publish before any artifacts go out.
  # =========================================================================
  verify-test-project:
    needs: build-linux
    runs-on: ubuntu-latest
    # Same image as build-linux — identical glibc, identical libstdc++,
    # devkitPro/libogc2/devkitARM all pre-installed. No per-platform install
    # steps needed; every matrix entry runs in the same baked environment.
    container:
      image: polyphaselabs/polyphase-bare:latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        platform: [Linux, Wii, GameCube, 3DS]
    steps:
      - name: Download editor + runtime tree
        uses: actions/download-artifact@v4
        with:
          name: polyphase-editor-tree

      - name: Restore script + binary execute bits
        run: |
          chmod +x Standalone/Build/Linux/PolyphaseEditor.elf
          find Tools Engine Standalone -type f -name '*.sh' -print0 \
            | xargs -0 -r chmod +x

      - name: Verify editor can load (ABI sanity check)
        run: |
          echo "Container glibc:"
          ldd --version | head -1 || true
          echo "Editor link check:"
          ldd Standalone/Build/Linux/PolyphaseEditor.elf || true
          if ! Standalone/Build/Linux/PolyphaseEditor.elf -h >/dev/null 2>err.txt; then
            if grep -q 'GLIBC' err.txt; then
              echo "FATAL: editor binary needs newer glibc than container provides." >&2
              cat err.txt >&2
              exit 1
            fi
          fi
          rm -f err.txt

      - name: Clone test project
        run: bash Tools/CI/TestBuildProject/clone_test_project.sh "${{ env.TEST_PROJECT_REPO }}" ./test-project

      - name: Verify build for ${{ matrix.platform }}
        run: |
          bash Tools/CI/TestBuildProject/verify_project_build.sh \
            Standalone/Build/Linux/PolyphaseEditor.elf \
            "./test-project/${{ env.TEST_PROJECT_SUBDIR }}" \
            ${{ matrix.platform }}

      - name: Cleanup local clone
        if: always()
        run: bash Tools/CI/TestBuildProject/cleanup_test_project.sh ./test-project || true

  # =========================================================================
  #  Publish Docker image to Docker Hub
  #
  #  Builds and pushes polyphaselabs/polyphase-engine (Docker/Dockerfile):
  #  bare toolchain + cloned engine + prebuilt Linux Editor +
  #  build-{editor,linux,3ds,gcn,wii} entrypoint scripts. End-user facing —
  #  bind-mount a project and call `build-3ds` etc. without installing any
  #  toolchain locally.
  #
  #  The companion polyphaselabs/polyphase-bare image (Docker/Dockerfile.base)
  #  is NOT built here. The devkitPro install step is slow and historically
  #  flaky from this runner (Cloudflare 403s, pacman dependency-cycle
  #  warnings on libogc2/ogc-cmake), so the bare image is built and pushed
  #  manually from a local workstation when Dockerfile.base changes. The
  #  `build-linux` / `verify-test-project` jobs above still `container:` from
  #  it via the published `:latest` tag; consumers like the Polyphase
  #  CodeAgent OpenClaw container still FROM it. CI just doesn't republish.
  #
  #  Runs FIRST in the workflow (no `needs:`). build-windows and build-linux
  #  gate on this job so a Docker build crash skips the rest of the release
  #  instead of paying for the Windows installer + Linux editor compile and
  #  *then* failing to ship. Trade-off: we no longer gate publish on
  #  verify-test-project — the docker build itself recompiles the Linux
  #  Editor against the same toolchain verify-test-project uses, so a
  #  broken editor still fails the docker build; we just don't run the
  #  per-platform packaging matrix against it before publishing. If a
  #  console-specific regression slips through, verify-test-project will
  #  still flag it on the same run and create-release will skip.
  #
  #  Required repository secrets:
  #    DOCKERHUB_USERNAME — Docker Hub login (e.g. "polyphaselabs").
  #    DOCKERHUB_TOKEN    — Docker Hub access token with Read & Write on
  #                         the engine repo. Created at
  #                         https://hub.docker.com/settings/security.
  #
  #  Optional repository variables (override env defaults above):
  #    DOCKERHUB_ENGINE_IMAGE — override the engine image namespace/name.
  # =========================================================================
  publish-docker-images:
    runs-on: ubuntu-latest
    # If forks haven't set up Docker Hub creds yet, skip cleanly instead of
    # failing the whole release. The secret check has to be guarded outside
    # `if:` (secrets can't be evaluated in `if:`) — we re-check inside steps.
    steps:
      - name: Skip if Docker Hub credentials are missing
        id: gate
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::warning::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN not set; skipping image publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.publish == 'true'
        uses: actions/checkout@v4
        with:
          # Submodules are needed by Docker/Dockerfile because it does
          # `COPY . /polyphase/` and then runs `make` against the source
          # tree, which expects bullet3 / PolyVox / libgit2 / etc. to be
          # present. Dockerfile.base doesn't need them but actions/checkout
          # is cheap; do it once.
          submodules: recursive
          # Need full history so we can check if the tag's commit is an
          # ancestor of main (used below to decide whether to push :latest).
          fetch-depth: 0

      - name: Mark workspace safe (for any local git ops inside the build)
        if: steps.gate.outputs.publish == 'true'
        run: git config --global --add safe.directory '*'

      # Tags don't carry a branch association in git, so to decide whether
      # this release should become :latest, we check if the tag's commit is
      # reachable from origin/main. Beta/RC tags pushed from main get :latest
      # too (matches the "main is the release line" model).
      - name: Check if tag commit is on main
        if: steps.gate.outputs.publish == 'true'
        id: branch-check
        run: |
          git fetch origin main --depth=200 2>/dev/null || true
          if git merge-base --is-ancestor HEAD origin/main 2>/dev/null; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag is on main — will push :latest"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag is NOT on main — skipping :latest"
          fi

      # Resolve final engine image name + the version derived from the tag.
      - name: Resolve image refs
        if: steps.gate.outputs.publish == 'true'
        id: meta
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          engine="${{ vars.DOCKERHUB_ENGINE_IMAGE }}"
          [ -n "$engine" ] || engine="${{ env.DEFAULT_ENGINE_IMAGE }}"
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "engine=$engine"   >> "$GITHUB_OUTPUT"
          echo "::notice::Publishing $engine:$version"

      # Only linux/amd64 — devkitPro toolchain binaries and Vulkan SDK
      # tarball are x86_64-only. No QEMU needed for cross-arch.
      - name: Set up Docker Buildx
        if: steps.gate.outputs.publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.gate.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---- Full engine image (Docker/Dockerfile) ----
      # The bare image (Docker/Dockerfile.base) is intentionally NOT built
      # here — see job-header docstring above. Push it manually from a
      # local workstation when Dockerfile.base changes.
      - name: Compute tags + labels for engine image
        if: steps.gate.outputs.publish == 'true'
        id: engine_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.engine }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ steps.branch-check.outputs.on_main == 'true' }}

      - name: Build and push engine image
        if: steps.gate.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.engine_meta.outputs.tags }}
          labels: ${{ steps.engine_meta.outputs.labels }}
          # Separate cache scope so a Dockerfile-only edit doesn't churn
          # the bare-image cache (the full image's first ~75% of layers
          # match Dockerfile.base, but they're separate buildx graphs).
          cache-from: type=gha,scope=docker-engine
          cache-to: type=gha,mode=max,scope=docker-engine

      - name: Summary
        if: steps.gate.outputs.publish == 'true'
        run: |
          {
            echo "## Docker image published"
            echo ""
            echo "Full engine + prebuilt editor (end-user shipping container):"
            echo '```'
            echo "docker pull ${{ steps.meta.outputs.engine }}:${{ steps.meta.outputs.version }}"
            echo "docker pull ${{ steps.meta.outputs.engine }}:latest"
            echo '```'
            echo ""
            echo "Bare toolchain image (polyphaselabs/polyphase-bare) is published manually — not built by this workflow."
          } >> "$GITHUB_STEP_SUMMARY"

  # =========================================================================
  #  Create GitHub Release with all artifacts
  # =========================================================================
  create-release:
    needs: [build-windows, build-linux, verify-test-project]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pattern excludes `polyphase-editor-tree` — that's CI scaffolding for
      # the verify-test-project job (whole engine source tree including
      # External/bullet3/build3/premake*.exe and External/vswhere/vswhere.exe),
      # not user-facing. Without this filter those extra .exe's were leaking
      # into the GitHub Release alongside the installer.
      - name: Download user-facing release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: '{windows-installer,windows-sdk,linux-deb,linux-tarball}'
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Tight globs — only the specific installer/package files we
          # produce, not whatever .exe happens to be in the download tree.
          files: |
            release-assets/**/PolyphaseSetup-*.exe
            release-assets/**/polyphase-sdk-windows-x64.zip
            release-assets/**/polyphase-engine_*_amd64.deb
            release-assets/**/PolyphaseEditor-linux-x64.tar.gz
