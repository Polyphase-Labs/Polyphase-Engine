name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  # Test project used by verify-test-project. Swap by editing these two lines.
  TEST_PROJECT_REPO: https://github.com/mholtkamp/octo-bombers
  TEST_PROJECT_SUBDIR: Bomber   # subdirectory inside the clone that contains the .octp

jobs:
  # =========================================================================
  #  Windows: Build engine + create Inno Setup installer
  # =========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: |
          git submodule init -- External/bullet3 External/doxygen-awesome-css External/zep Engine/External/PolyVox Engine/External/libgit2 Plugins/Blender/polyshade-gameengine-connect
          git submodule update --recursive

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $VER = "1.3.275.0"
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$VER/windows/VulkanSDK-$VER-Installer.exe" -OutFile "$env:TEMP\VulkanSDK.exe"
          Start-Process -FilePath "$env:TEMP\VulkanSDK.exe" -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
          echo "VULKAN_SDK=C:\VulkanSDK\$VER" >> $env:GITHUB_ENV

      - name: Compile shaders
        shell: cmd
        working-directory: Engine/Shaders/GLSL
        run: compile.bat

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Prebuild libgit2
        shell: cmd
        run: |
          cd Engine\External\libgit2
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DBUILD_SHARED_LIBS=OFF -DBUILD_TESTS=OFF -DBUILD_CLI=OFF -DBUILD_EXAMPLES=OFF -DUSE_SSH=OFF -DUSE_BUNDLED_ZLIB=ON -DREGEX_BACKEND=builtin
          cmake --build build --config Release
          cmake --build build --config Debug
          if not exist "..\..\External\lib\Lib" mkdir "..\..\External\lib\Lib"
          copy /Y "build\Release\git2.lib" "..\..\External\lib\Lib\git2.lib"
          copy /Y "build\Debug\git2.lib" "..\..\External\lib\Lib\git2d.lib"

      - name: Generate Standalone embedded asset stubs
        run: python Tools/generate_embedded_stubs.py

      - name: Build Engine (ReleaseEditor x64)
        run: msbuild Polyphase.sln /p:Configuration=ReleaseEditor /p:Platform=x64 /m

      # stage_distribution.py only WARNS when these are missing, which produces a
      # broken installer where native addons can't link (LNK1181: Polyphase.lib
      # not found). Fail the workflow here so the issue is caught loudly.
      - name: Verify import libraries for native addon builds
        shell: cmd
        run: |
          if not exist "Standalone\Build\Windows\x64\ReleaseEditor\Polyphase.lib" (
            echo ERROR: Polyphase.lib was not produced by the engine build.
            echo        Expected: Standalone\Build\Windows\x64\ReleaseEditor\Polyphase.lib
            echo        Without it, native addons cannot link against the installed editor.
            exit /b 1
          )
          if not exist "External\Lua\Build\Windows\x64\ReleaseEditor\Lua.lib" (
            echo ERROR: Lua.lib was not produced by the engine build.
            echo        Expected: External\Lua\Build\Windows\x64\ReleaseEditor\Lua.lib
            exit /b 1
          )
          echo [OK] Polyphase.lib and Lua.lib found.

      - name: Stage distribution files
        run: python Installers/stage_distribution.py --platform windows --verbose

      - name: Verify staged import libraries
        shell: cmd
        run: |
          if not exist "dist\Editor\Polyphase.lib" (
            echo ERROR: Polyphase.lib is missing from the staged distribution.
            echo        Expected: dist\Editor\Polyphase.lib
            echo        The installer would ship without native-addon link support.
            exit /b 1
          )
          if not exist "dist\Editor\Lua.lib" (
            echo ERROR: Lua.lib is missing from the staged distribution.
            echo        Expected: dist\Editor\Lua.lib
            exit /b 1
          )
          echo [OK] Import libraries staged into dist\Editor\.

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc Installers\Windows\PolyphaseSetup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/PolyphaseSetup-*.exe

  # =========================================================================
  #  Linux: Build engine + create .deb and tarball
  # =========================================================================
  build-linux:
    # Pinned to 22.04 (glibc 2.35, gcc 11 / GLIBCXX_3.4.30) so the released
    # editor binary runs on the broadest set of Linux distros (Debian Bookworm,
    # Ubuntu 22.04+, RHEL 9, etc.) and on the Bookworm-based devkitPro images
    # used by the verify-test-project matrix. ubuntu-latest (24.04) links
    # against glibc 2.38/GLIBCXX_3.4.32 which excludes Bookworm and many
    # currently-deployed user systems.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: |
          git submodule init -- External/bullet3 External/doxygen-awesome-css External/zep Engine/External/PolyVox Engine/External/libgit2 Plugins/Blender/polyshade-gameengine-connect
          git submodule update --recursive

      - name: Install Vulkan SDK
        run: |
          VER=1.3.275.0
          wget -q https://sdk.lunarg.com/sdk/download/$VER/linux/vulkansdk-linux-x86_64-$VER.tar.xz
          sudo mkdir -p /opt/vulkan
          sudo tar -xf vulkansdk-linux-x86_64-$VER.tar.xz -C /opt/vulkan
          rm vulkansdk-linux-x86_64-$VER.tar.xz
          echo "VULKAN_SDK=/opt/vulkan/$VER/x86_64" >> $GITHUB_ENV
          echo "/opt/vulkan/$VER/x86_64/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=/opt/vulkan/$VER/x86_64/lib" >> $GITHUB_ENV

      - name: Compile shaders
        working-directory: Engine/Shaders/GLSL
        run: chmod +x compile.sh && ./compile.sh

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev libasound2-dev libx11-dev \
            libpulse-dev \
            libavformat-dev libavcodec-dev libavutil-dev libswscale-dev libswresample-dev \
            pkg-config dpkg-dev cmake
          # libpulse-dev: streaming audio backend (engine)
          # libav*-dev / libsw*-dev: FFmpeg backend used by the VideoPlayer addon
          # pkg-config: addon build scripts resolve FFmpeg via pkg-config on Linux

      - name: Prebuild libgit2
        run: bash Tools/prebuild_libgit2.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Standalone embedded asset stubs
        run: python3 Tools/generate_embedded_stubs.py

      - name: Build Engine (Linux Editor)
        run: make -C Standalone -f Makefile_Linux_Editor -j$(nproc)

      # The Linux engine build statically compiles Lua sources directly into
      # libEngineEditor.a, so it does NOT produce a standalone libLua.a the way
      # the Windows Lua.vcxproj produces Lua.lib. Build libLua.a separately so
      # stage_distribution.py can ship it for native-addon link support. Use
      # the `a` target (archive only) to avoid pulling in -lreadline for the
      # lua/luac binaries we don't need.
      - name: Build libLua.a for native addons
        # The in-tree .o files left behind by External/Lua/Makefile would
        # pollute the artifact and break Wii/GC/3DS verify (PPC ld rejects
        # x86-64 lapi.o). `make clean` removes them; the staged libLua.a
        # at Build/Linux/x64/ReleaseEditor/ survives because clean only
        # touches in-tree paths.
        run: |
          make -C External/Lua a -j$(nproc)
          mkdir -p External/Lua/Build/Linux/x64/ReleaseEditor
          cp External/Lua/liblua.a External/Lua/Build/Linux/x64/ReleaseEditor/libLua.a
          make -C External/Lua clean

      # stage_distribution.py only WARNS when libLua.a is missing, which
      # produces a broken package where native addons must fall back to a
      # system Lua. Fail the workflow here so the issue is caught loudly.
      - name: Verify import library for native addon builds
        run: |
          LUA_LIB_RELEASE="External/Lua/Build/Linux/x64/ReleaseEditor/libLua.a"
          LUA_LIB_DEBUG="External/Lua/Build/Linux/x64/DebugEditor/libLua.a"
          if [ ! -f "$LUA_LIB_RELEASE" ] && [ ! -f "$LUA_LIB_DEBUG" ]; then
            echo "ERROR: libLua.a was not produced by the engine build."
            echo "       Expected at one of:"
            echo "         $LUA_LIB_RELEASE"
            echo "         $LUA_LIB_DEBUG"
            exit 1
          fi
          echo "[OK] libLua.a found."

      # Upload the editor binary plus the source/headers/Makefiles the headless
      # editor needs at runtime (it shells out to make for per-platform game
      # builds). The verify-test-project matrix downloads this so it doesn't have to
      # rebuild the engine 4x.
      - name: Upload editor + runtime tree for verify-test-project
        uses: actions/upload-artifact@v4
        with:
          name: polyphase-editor-tree
          # Exclude Intermediate/ everywhere — gcc's -MMD .d files have
          # absolute paths from the build-host runner, which break make in
          # the verify container (different workspace path).
          path: |
            Standalone/Build/Linux/PolyphaseEditor.elf
            Engine
            External
            Standalone
            Template
            Tools
            Plugins
            !**/Intermediate
            !**/Intermediate/**
          retention-days: 1
          if-no-files-found: error

      - name: Build .deb package
        run: bash Installers/build_deb_linux.sh

      - name: Build tarball
        run: bash Installers/build_tarball_linux.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/polyphase-engine_*_amd64.deb

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: dist/PolyphaseEditor-linux-x64.tar.gz

  # =========================================================================
  #  Verify the engine can package a real project end-to-end (Linux/Wii/
  #  GameCube/3DS) by headless-building $TEST_PROJECT_REPO. Gates the
  #  release so a regression in the headless build path or a per-platform
  #  Makefile blocks publish before any artifacts go out.
  # =========================================================================
  verify-test-project:
    needs: build-linux
    runs-on: ubuntu-latest
    # See verify-build.yml for the rationale: pkg.devkitpro.org sits behind
    # Cloudflare and 403's `apt-get install devkitpro-pacman` intermittently.
    # Using the prebuilt devkitPro Docker images bypasses the package fetch
    # entirely. Linux uses ubuntu:24.04 to match the editor's build env.
    container:
      image: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: Linux,    container: 'ubuntu:24.04' }
          - { platform: Wii,      container: 'devkitpro/devkitppc:latest' }
          - { platform: GameCube, container: 'devkitpro/devkitppc:latest' }
          - { platform: 3DS,      container: 'devkitpro/devkitarm:latest' }
    steps:
      - name: Install runtime deps and shell tools
        # Containers are minimal — install everything the editor + scripts need.
        # No sudo because we're root inside the container. ALSA package name
        # is libasound2t64 on Ubuntu 24.04+ and libasound2 on Debian Bookworm
        # (which is what the devkitPro images use); pick whichever exists.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            libvulkan1 libxcb1 libpulse0 libssl3 \
            git ca-certificates findutils xz-utils binutils
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            apt-get install -y --no-install-recommends libasound2t64
          else
            apt-get install -y --no-install-recommends libasound2
          fi

      - name: Download editor + runtime tree
        uses: actions/download-artifact@v4
        with:
          name: polyphase-editor-tree

      - name: Restore script + binary execute bits
        run: |
          chmod +x Standalone/Build/Linux/PolyphaseEditor.elf
          find Tools Engine Standalone -type f -name '*.sh' -print0 \
            | xargs -0 -r chmod +x

      - name: Verify editor can load (glibc / dyn-link sanity check)
        # Editor is built on ubuntu-22.04 (glibc 2.35) so it loads on both
        # Bookworm (devkitPro images, 2.36) and ubuntu:24.04 (Linux verify).
        # Sanity guard: if the build runner drifts to a newer libc the FATAL
        # message surfaces here instead of much deeper in the build flow.
        run: |
          echo "Container glibc:"
          ldd --version | head -1 || true
          echo "Editor glibc requirements:"
          objdump -T Standalone/Build/Linux/PolyphaseEditor.elf 2>/dev/null \
            | awk '/GLIBC_/ { print $5 }' | sort -u || true
          echo "Editor link check:"
          if ! ldd Standalone/Build/Linux/PolyphaseEditor.elf; then
            echo "WARNING: ldd reported issues — editor may not load." >&2
          fi
          if ! Standalone/Build/Linux/PolyphaseEditor.elf -h >/dev/null 2>ldd-err.txt; then
            if grep -q 'GLIBC' ldd-err.txt; then
              echo "FATAL: editor binary needs newer glibc than container provides." >&2
              cat ldd-err.txt >&2
              exit 1
            fi
          fi
          rm -f ldd-err.txt

      - name: Install Linux compile toolchain (Linux verify only)
        if: matrix.platform == 'Linux'
        # ubuntu:24.04 is minimal — no make, no g++, no glslc by default.
        # The headless editor invokes:
        #   - Engine/Shaders/GLSL/compile.sh   (calls glslc)
        #   - make -C Standalone -f Makefile_TEMP -j 12   (needs make + g++)
        # devkitPro images already have host build tools, so this is Linux-only.
        run: |
          apt-get install -y --no-install-recommends \
            build-essential glslc

      - name: Install libogc2 (Wii / GameCube only)
        if: matrix.platform == 'Wii' || matrix.platform == 'GameCube'
        # See verify-build.yml for the rationale: temp pacman.conf with only
        # the libogc2-devkitpro repo, so we never sync pkg.devkitpro.org
        # (which Cloudflare 403's). Local DB resolves transitive devkitPPC
        # deps as already-installed.
        run: |
          set -e
          LIBOGC2_KEY="C8A2759C315CFBC3429CC2E422B803BA8AA3D7CE"
          if ! dkp-pacman-key --list-keys "$LIBOGC2_KEY" >/dev/null 2>&1; then
            dkp-pacman-key --recv-keys "$LIBOGC2_KEY" --keyserver keyserver.ubuntu.com
            dkp-pacman-key --lsign-key "$LIBOGC2_KEY"
          fi
          TMP_CONF=/tmp/pacman-libogc2.conf
          {
            echo '[options]'
            echo 'Architecture = auto'
            echo 'SigLevel = Required DatabaseOptional'
            echo 'LocalFileSigLevel = Optional'
            echo 'GPGDir = /opt/devkitpro/pacman/etc/pacman.d/gnupg/'
            echo ''
            echo '[libogc2-devkitpro]'
            echo 'Server = https://packages.libogc2.org/devkitpro/linux/$arch'
            echo 'Server = https://packages.extremscorner.org/devkitpro/linux/$arch'
          } > "$TMP_CONF"
          install_ok=0
          for attempt in 1 2 3; do
            if [ $attempt -gt 1 ]; then
              echo "Retrying libogc2 install (attempt $attempt of 3)..." >&2
              sleep $((attempt * 3))
            fi
            if dkp-pacman --config "$TMP_CONF" \
                          --dbpath /opt/devkitpro/pacman/var/lib/pacman \
                          -Syy --noconfirm \
               && dkp-pacman --config "$TMP_CONF" \
                             --dbpath /opt/devkitpro/pacman/var/lib/pacman \
                             -S --noconfirm libogc2 libogc2-libdvm; then
              install_ok=1
              break
            fi
          done
          if [ $install_ok -ne 1 ]; then
            echo "ERROR: libogc2 install failed" >&2
            exit 1
          fi
          test -f /opt/devkitpro/libogc2/gamecube_rules
          test -f /opt/devkitpro/libogc2/wii_rules

      - name: Surface devkitPro env vars for the headless editor's make
        if: matrix.platform != 'Linux'
        run: |
          {
            echo "DEVKITPRO=/opt/devkitpro"
            echo "DEVKITPPC=/opt/devkitpro/devkitPPC"
            echo "DEVKITARM=/opt/devkitpro/devkitARM"
          } >> "$GITHUB_ENV"
          {
            echo "/opt/devkitpro/tools/bin"
            echo "/opt/devkitpro/devkitPPC/bin"
            echo "/opt/devkitpro/devkitARM/bin"
          } >> "$GITHUB_PATH"

      - name: Clone test project
        run: bash Tools/CI/TestBuildProject/clone_test_project.sh "${{ env.TEST_PROJECT_REPO }}" ./test-project

      - name: Verify build for ${{ matrix.platform }}
        run: |
          bash Tools/CI/TestBuildProject/verify_project_build.sh \
            Standalone/Build/Linux/PolyphaseEditor.elf \
            "./test-project/${{ env.TEST_PROJECT_SUBDIR }}" \
            ${{ matrix.platform }}

      - name: Cleanup local clone
        if: always()
        run: bash Tools/CI/TestBuildProject/cleanup_test_project.sh ./test-project || true

  # =========================================================================
  #  Create GitHub Release with all artifacts
  # =========================================================================
  create-release:
    needs: [build-windows, build-linux, verify-test-project]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.deb
            release-assets/**/*.tar.gz
