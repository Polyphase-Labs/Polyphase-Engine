name: Install Vulkan SDK (Polyphase mirror)
description: >
  Downloads and extracts the Vulkan SDK from a GitHub Release asset on the
  Polyphase-Labs/Polyphase-Engine repo, then exports VULKAN_SDK so subsequent
  build steps pick it up. Sidesteps LunarG's habit of cycling old SDK
  installers off their CDN — the engine repo self-hosts the installed-tree
  zip per version.
  Windows runners only — Linux uses the polyphaselabs/polyphase-engine
  Docker image which has the SDK baked in.
  Companion documentation: Documentation/Development/SetupEnvironment/Windows.md
  must list the same version this action defaults to.

inputs:
  version:
    description: >
      Vulkan SDK version. The release tag on the engine repo must be
      `vulkan-sdk-<version>` and the asset must be
      `VulkanSDK-<version>-installed.zip`.
    required: false
    default: 1.3.275.0
  polyphase-repo:
    description: >
      Repo that hosts the mirrored Vulkan SDK zip asset. Override per fork
      that publishes under a different namespace.
    required: false
    default: Polyphase-Labs/Polyphase-Engine
  mirror-url:
    description: >
      Full asset URL override. If non-empty, takes precedence over the
      version/polyphase-repo combo. Use this when pulling from a private
      mirror or an alternate location.
    required: false
    default: ''

outputs:
  vulkan-sdk-dir:
    description: Absolute path to the extracted Vulkan SDK on the runner.
    value: ${{ steps.install.outputs.dir }}

runs:
  using: composite
  steps:
    - name: Download and extract Vulkan SDK
      id: install
      shell: pwsh
      run: |
        $ver = "${{ inputs.version }}"
        $repo = "${{ inputs.polyphase-repo }}"
        $override = "${{ inputs.mirror-url }}"
        if ([string]::IsNullOrWhiteSpace($override)) {
          $url = "https://github.com/$repo/releases/download/vulkan-sdk-$ver/VulkanSDK-$ver-installed.zip"
        } else {
          $url = $override
        }

        $dst = "C:\VulkanSDK\$ver"
        $zip = "$env:RUNNER_TEMP\VulkanSDK-$ver.zip"

        Write-Host "Vulkan SDK $ver"
        Write-Host "  mirror URL : $url"
        Write-Host "  install dir: $dst"

        Invoke-WebRequest -Uri $url -OutFile $zip -UserAgent "Mozilla/5.0"
        New-Item -ItemType Directory -Force -Path $dst | Out-Null
        Expand-Archive -Path $zip -DestinationPath $dst -Force

        # Sanity-check: a corrupt or wrong-shaped zip would otherwise surface
        # as a vulkan/vulkan.h not found or LNK1104 vulkan-1.lib far later.
        if (-not (Test-Path "$dst\Include\vulkan")) {
          throw "Vulkan SDK extract failed: $dst\Include\vulkan missing"
        }
        if (-not (Test-Path "$dst\Lib\vulkan-1.lib")) {
          throw "Vulkan SDK extract failed: $dst\Lib\vulkan-1.lib missing"
        }

        "VULKAN_SDK=$dst" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "dir=$dst"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
